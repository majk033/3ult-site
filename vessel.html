    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ULT // NEXT VESSEL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- BAZA STRONY --- */
        body {
            background-color: #faf0e6; 
            color: #000000; 
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif;
        }

        .top-logo {
            position: absolute;
            top: 5vh; 
            width: 120px; 
            height: auto;
            z-index: 100;
            cursor: pointer; 
            /* Brak przesuwania, zostaje w centrum */
            transition: filter 0.3s ease;
        }

        .top-logo:hover {
            filter: drop-shadow(0 0 8px rgba(153, 0, 0, 0.5));
        }

        /* --- UKŁAD GŁÓWNY --- */
        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 95vw; 
            height: 85vh;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* --- LEWA STRONA (PRODUKT) --- */
        .product-side {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 30;
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .product-container {
            position: relative; 
            cursor: pointer;
            transition: transform 0.6s ease;
            transform: translateY(-5vh); 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
            overflow: hidden; 
            border-radius: 2px; 
            -webkit-mask-image: -webkit-radial-gradient(white, black); 
        }

        .product-container:hover {
            transform: translateY(-5vh) scale(1.02);
        }

        .product-mockup {
            width: 35vw; 
            max-width: 450px;
            min-width: 280px;
            height: auto;
            display: block; 
            outline: none; 
            border: none;
            background-color: transparent;
            transform: scale(1.04); 
            transform-origin: center;
            transition: opacity 0.5s ease;
        }

        /* --- PRAWA STRONA (DETALE) --- */
        .details-side {
            flex: 0; 
            opacity: 0;
            visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding-left: 0; 
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
            max-width: 0;
            max-height: 80vh;
            overflow-y: auto;
            scrollbar-width: none; 
            -ms-overflow-style: none;
        }
        .details-side::-webkit-scrollbar { display: none; }

        .product-title { font-family: 'UnifrakturCook', cursive; font-size: 32px; color: #000000; margin-bottom: 1.5vh; letter-spacing: 3px; text-transform: uppercase; white-space: nowrap; }
        .product-description { color: #000000; font-size: 14px; line-height: 1.8; letter-spacing: 1px; max-width: 700px; min-width: 300px; text-align: left; margin-bottom: 3vh; }
        .desc-item { display: flex; margin-bottom: 8px; }
        .desc-label { font-weight: 700; text-transform: uppercase; font-size: 12px; display: inline-block; width: 75px; flex-shrink: 0; }
        .desc-content { flex: 1; }

        .action-buttons { display: flex; flex-direction: column; align-items: flex-start; gap: 1.5vh; margin-bottom: 3vh; width: 100%; }
        .action-btn { background: none; border: none; color: #000000; font-family: 'UnifrakturCook', cursive; font-size: 22px; letter-spacing: 2px; text-transform: lowercase; cursor: pointer; padding: 0; transition: color 0.3s ease, text-shadow 0.3s ease; white-space: nowrap; }
        .action-btn:hover { color: #990000; text-shadow: 0 0 10px rgba(153, 0, 0, 0.4); }

        .collapsible-wrapper { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.6s ease; width: 100%; max-width: 400px; }
        .collapsible-wrapper.active { max-height: 1000px; opacity: 1; margin-bottom: 3vh; }
        .size-chart-image { width: 100%; height: auto; border: none; display: block; }

        /* --- LISTA DOSTĘPNOŚCI --- */
        .stock-list { display: flex; flex-direction: column; gap: 15px; width: 100%; padding-top: 10px; }
        .stock-item { display: flex; flex-direction: column; gap: 5px; }
        .stock-info { display: flex; justify-content: space-between; align-items: center; font-size: 14px; font-weight: 700; letter-spacing: 1px; }
        .stock-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .stock-size { text-transform: uppercase; }
        
        .request-btn { font-size: 10px; color: #990000; font-weight: bold; text-decoration: none; text-transform: lowercase; letter-spacing: 2px; transition: color 0.3s ease; white-space: nowrap; }
        .request-btn:hover { color: #ff0000; text-shadow: 0 0 8px rgba(153, 0, 0, 0.5); }
        
        /* Styl zablokowanego przycisku (Kłódka) */
        .locked-btn { font-size: 10px; color: #990000; text-transform: lowercase; letter-spacing: 1.5px; font-weight: 700; cursor: default; display: flex; align-items: center; gap: 5px; }
        .sold-out-btn { font-size: 10px; color: #666; text-decoration: none; text-transform: lowercase; letter-spacing: 2px; pointer-events: none; white-space: nowrap; }

        .stock-bar-bg { width: 100%; height: 2px; background-color: #dcd3c9; position: relative; }
        .stock-bar-fill { height: 100%; background-color: #000000; position: absolute; left: 0; top: 0; transition: width 1s ease; }
        .stock-bar-fill.low-stock { background-color: #990000; box-shadow: 0 0 8px rgba(153, 0, 0, 0.6); }

        /* --- DOLNE LINKI --- */
        .subtle-link { position: fixed; bottom: 3vh; z-index: 105; color: #888; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 11px; letter-spacing: 2px; text-transform: lowercase; text-decoration: none; transition: color 0.4s ease, text-shadow 0.4s ease; }
        .link-left { left: 5vw; }
        .link-right { right: 5vw; }
        .subtle-link:hover { color: #990000; text-shadow: 0 0 8px rgba(153, 0, 0, 0.4); }

        /* --- STAN PO KLIKNIĘCIU --- */
        body.show-details { overflow-y: auto; }
        body.show-details .details-side { flex: 1.5; opacity: 1; visibility: visible; max-width: 800px; padding-left: 5vw; }
        
        /* --- SLIDER I ZDJĘCIA --- */
        .slider-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; visibility: hidden; pointer-events: none; }
        .slide-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s ease; transform: scale(1.04); }
        .slide-img.active { opacity: 1; }

        .slider-nav { position: absolute; background: transparent; border: none; color: #000000; font-family: 'Segoe UI', sans-serif; font-weight: 700; cursor: pointer; z-index: 40; transition: color 0.3s, text-shadow 0.3s; pointer-events: auto; }
        .slider-nav:hover { color: #990000; text-shadow: 0 0 8px rgba(153, 0, 0, 0.5); }

        .nav-arrow { top: 50%; transform: translateY(-50%); font-size: 24px; padding: 20px; }
        #slide-prev { left: -10px; }
        #slide-next { right: -10px; }
        .nav-close { top: 15px; left: 50%; transform: translateX(-50%); font-size: 11px; letter-spacing: 2px; text-transform: lowercase; padding: 10px; }

        body.show-details .product-mockup { opacity: 0; }
        body.show-details .slider-wrapper { opacity: 1; visibility: visible; pointer-events: auto; }

        /* --- KURTYNA PRZEJŚCIA (3 KROPKI) --- */
        .transition-overlay {
            position: absolute; inset: 0; background-color: #faf0e6; z-index: 50; display: flex; justify-content: center; align-items: center; gap: 15px; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        body.is-transitioning .transition-overlay { opacity: 1; visibility: visible; }

        .trans-dot {
            width: 14px; height: 14px; background-color: #990000; border-radius: 40% 60% 70% 30% / 50% 60% 30% 70%; box-shadow: inset 0 0 3px rgba(0,0,0,0.4); opacity: 0; transform: scale(0.5);
        }

        body.is-transitioning .trans-dot { animation: dotPulse 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        body.is-transitioning .trans-dot:nth-child(1) { animation-delay: 0.1s; }
        body.is-transitioning .trans-dot:nth-child(2) { animation-delay: 0.25s; }
        body.is-transitioning .trans-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%   { opacity: 0; transform: scale(0.5) translateY(10px); }
            50%  { opacity: 1; transform: scale(1.3) translateY(0); box-shadow: 0 0 15px rgba(153, 0, 0, 0.6); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- RĘCE --- */
        .hands-container { position: fixed; inset: 0; pointer-events: none; z-index: 10; overflow: hidden; }
        .hand { position: absolute; width: 42vw; max-width: 480px; min-width: 260px; height: auto; filter: grayscale(100%) contrast(1.5) brightness(0.7); transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s ease; bottom: -5vh; opacity: 0.9; }
        .hand-left { left: 50%; transform: translateX(-85%) translateY(12vh); }
        .hand-center { left: 50%; transform: translateX(-50%) translateY(14vh) scale(1.05); }
        .
