<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ULT // COMING SOON...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            gap: 35px;
        }

        .gothic-text {
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
        }

        img {
            max-width: 350px;
            width: 80%;
            height: auto;
            opacity: 0; 
            animation: fadeIn 2.0s ease-out forwards; 
        }

        .coming-soon-container {
            color: #990000; 
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase; 
            display: flex;
            gap: 15px; 
        }

        .coming-text {
            opacity: 0;
            animation: fadeIn 2.0s ease-out 1.0s forwards; 
        }

        .soon-text {
            opacity: 0;
            animation: fadeIn 2.0s ease-out 2.5s forwards; 
        }

        .part-of-it {
            color: #000000;
            font-size: 26px;
            letter-spacing: 2px;
            text-transform: lowercase;
            opacity: 0;
            animation: fadeIn 2.0s ease-out 4.0s forwards; 
        }

        .countdown {
            display: flex;
            gap: 20px;
            color: #000000;
            opacity: 0;
            animation: fadeIn 2.0s ease-out 5.5s forwards; 
        }

        .countdown div {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 65px; 
        }

        /* Wymuszamy gotycką czcionkę TYLKO dla cyfr */
        .countdown-number {
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
            font-size: 36px;
            font-variant-numeric: tabular-nums; 
        }

        /* Zwykła, czysta czcionka TYLKO dla małych podpisów (dni, godz) */
        .countdown-label {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            margin-top: 5px;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: #999;
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeIn 2.0s ease-out 7.0s forwards; 
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <img src="3ULT.png" alt="3ULT LOGO">
    
    <div class="coming-soon-container gothic-text">
        <span class="coming-text">COMING</span>
        <span class="soon-text">SOON...</span>
    </div>

    <div class="part-of-it gothic-text">be the part of it.</div>
    
    <div id="countdown" class="countdown"></div>

    <div class="footer">3ULT // 2026 // COMING SOON...</div>

    <script>
        const countDownDate = new Date("Apr 23, 2026 00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const formatTime = (time) => time < 10 ? "0" + time : time;

            // Używamy nowych, rozdzielonych klas
            document.getElementById("countdown").innerHTML = 
                "<div><span class='countdown-number'>" + formatTime(days) + "</span><span class='countdown-label'>dni</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(hours) + "</span><span class='countdown-label'>godz</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(minutes) + "</span><span class='countdown-label'>min</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(seconds) + "</span><span class='countdown-label'>sek</span></div>";

            if (distance < 0) {
                clearInterval(x);
                // Komunikat po zakończeniu odliczania z gotycką czcionką
                document.getElementById("countdown").innerHTML = "<span class='gothic-text' style='font-size: 32px;'>DROP JEST DOSTĘPNY</span>";
            }
        }, 1000);
    </script>

</body>
</html>
