<!DOCTYPE html>
<html lang="pl">
<head>
<link rel="icon" type="image/png" href="favicon.png">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    
    <!-- Blokuje natywny czarny kolor tła w telefonach z trybem ciemnym -->
    <meta name="color-scheme" content="light">
    <!-- Startowy kolor paska przeglądarki to czarny (zostanie zmieniony w JS) -->
    <meta name="theme-color" content="#000000" id="theme-color-meta">
    
    <title>3ULT // COMING SOON...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ZMIENNE RESPONSYWNE --- */
        :root {
            --light-size: 400px;
            --light-offset: -200px;
            --blur-max: 30px;
            --beam-C-Y: 0vh;  
            --beam-L-X: -32vw; --beam-L-Y: 0vh;
            --beam-R-X: 32vw;  --beam-R-Y: 0vh;
        }

        html {
            /* STARTOWO CZARNE DLA PASKÓW PRZEGLĄDARKI */
            background-color: #000000; 
            width: 100%;
            height: 100%;
            height: -webkit-fill-available; 
            margin: 0;
            padding: 0;
            overflow: hidden;
            transition: background-color 0.4s ease; 
        }

        body {
            /* STARTOWO CZARNE DLA PASKÓW PRZEGLĄDARKI */
            background-color: #000000;
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 100vh;
            min-height: -webkit-fill-available; 
            margin: 0;
            padding: 0;
            overflow: hidden; 
            overscroll-behavior: none; 
            transition: background-color 0.4s ease;
        }

        /* SZTUCZNE KREMOWE TŁO DLA EFEKTU ŚWIATŁA */
        .cream-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #faf0e6;
            z-index: 0; 
            pointer-events: none;
        }

        .paint-drips-container {
            position: fixed;
            inset: 0;
            z-index: 1; 
            pointer-events: none; 
        }

        .drip-group { position: absolute; width: 0; height: 0; }

        .drip {
            position: absolute;
            background-color: #990000;
            border-radius: 40% 60% 70% 30% / 50% 60% 30% 70%;
            opacity: 0;
            transform-origin: center;
            animation: liquidSplat 5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes liquidSplat {
            0%   { transform: scale(1.5) translateY(-15px); opacity: 0; }
            5%   { transform: scale(1.1) translateY(0); opacity: 1; } 
            10%  { transform: scale(1) translateY(0); opacity: 1; }   
            70%  { transform: scale(1) translateY(0); opacity: 1; }   
            100% { transform: scale(0.9) translateY(0); opacity: 0; } 
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            transform: translateY(-8vh);
            z-index: 50; 
        }

        .gothic-text { font-family: 'UnifrakturCook', cursive; font-weight: 700; }
        
        img {
            max-width: 300px; width: 70%; height: auto; margin-bottom: 1vh; min-height: 80px; 
        }

        .dev-phase-note {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            margin-bottom: 5vh;
            text-transform: lowercase;
            visibility: hidden; 
            opacity: 0;
            pointer-events: none;
        }

        .coming-soon-container {
            color: #990000; font-size: 32px; letter-spacing: 4px; text-transform: uppercase; 
            display: flex; justify-content: center; gap: 15px; margin-bottom: 1vh;
            white-space: nowrap; 
        }

        .part-of-it {
            color: #000000; font-size: 26px; letter-spacing: 2px; text-transform: lowercase;
            text-align: center; margin-bottom: 8vh; 
            white-space: nowrap; 
        }

        .countdown {
            display: flex; gap: 20px; color: #000000; min-height: 60px; 
        }

        .countdown div {
            display: flex; flex-direction: column; align-items: center; width: 65px; 
        }

        .countdown-number {
            font-family: 'UnifrakturCook', cursive; font-weight: 700; font-size: 36px;
            font-variant-numeric: tabular-nums; 
        }

        .countdown-label {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 10px;
            letter-spacing: 2px; text-transform: uppercase; color: #666; margin-top: 5px;
        }

        .next-vessel-link {
            display: inline-block;
            background-color: transparent; 
            color: #000000; 
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
            font-size: 24px;
            letter-spacing: 3px;
            text-transform: lowercase;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 8px;
            margin-top: 7vh; 
            transition: color 0.4s ease-in-out, text-shadow 0.4s ease-in-out, text-decoration-color 0.4s ease-in-out; 
            position: relative;
            z-index: 105; 
        }

        .next-vessel-link:hover, .next-vessel-link.active-shadow {
            color: #990000; 
            text-decoration-color: #990000; 
            text-shadow: 0 0 15px rgba(153, 0, 0, 0.5); 
        }

        .footer {
            position: absolute; 
            bottom: 20px; 
            font-size: 11px; 
            color: #aaa; 
            letter-spacing: 3px; 
            z-index: 10;
            transition: bottom 0.3s ease;
        }

        .subtle-link {
            position: fixed;
            bottom: 20px;
            z-index: 105; 
            color: #888; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: lowercase;
            text-decoration: none;
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        .link-left { left: 5vw; }
        .link-right { right: 5vw; }

        .subtle-link:hover {
            color: #990000; 
            text-shadow: 0 0 8px rgba(153, 0, 0, 0.4);
        }

        /* --- BLOKADA ANIMACJI DO ZAŁADOWANIA --- */
        .spotlight-wrapper, .lights-container, .light, .center-beam, .left-beam, .right-beam {
            animation-play-state: paused !important;
        }

        body.anim-ready .spotlight-wrapper,
        body.anim-ready .lights-container,
        body.anim-ready .light,
        body.anim-ready .center-beam,
        body.anim-ready .left-beam,
        body.anim-ready .right-beam {
            animation-play-state: running !important;
        }

        /* --- MASKA ŚWIATŁA (zmieniono na "both" by aplikować frame 0% na starcie) --- */
        .spotlight-wrapper {
            position: fixed; 
            top: -20vh; bottom: -20vh; left: -20vw; right: -20vw; 
            z-index: 100; pointer-events: none; 
            mix-blend-mode: multiply; 
            animation: removeDarkness 2s both; 
        }
        .lights-container {
            width: 100%; height: 100%; background-color: #000000; 
            animation: lightsFlicker 2s both; 
        }
        .light {
            position: absolute; top: 50%; left: 50%; width: var(--light-size); height: var(--light-size);
            margin-top: var(--light-offset); margin-left: var(--light-offset);
            border-radius: 40% 60% 70% 30% / 50% 60% 30% 70%; 
            background: radial-gradient(circle at center, rgba(255,255,255,1) 0%, rgba(255,255,255,1) 45%, rgba(0,0,0,1) 65%);
            mix-blend-mode: screen; animation: shapeWobble 1s infinite linear alternate-reverse both;
        }
        
        @keyframes shapeWobble { to { border-radius: 60% 40% 30% 70% / 60% 50% 70% 30%; } }
        
        .center-beam { animation: beamCenter 2s ease-in-out both, diffuseLight 2s ease-in-out both; }
        .left-beam { animation: beamLeft 2s ease-in-out both, diffuseLight 2s ease-in-out both; }
        .right-beam { animation: beamRight 2s ease-in-out both, diffuseLight 2s ease-in-out both; }

        @keyframes beamCenter {
            0%, 10% { transform: translate(0, 0); opacity: 0; } 
            15%, 25% { transform: translate(0, 0); opacity: 1; }
            40%, 100% { transform: translate(0, var(--beam-C-Y)); opacity: 1; }
        }
        @keyframes beamLeft {
            0%, 25% { transform: translate(0, 0); opacity: 0; } 
            26% { transform: translate(0, 0); opacity: 1; } 
            40%, 100% { transform: translate(var(--beam-L-X), var(--beam-L-Y)); opacity: 1;} 
        }
        @keyframes beamRight {
            0%, 25% { transform: translate(0, 0); opacity: 0; } 
            26% { transform: translate(0, 0); opacity: 1; } 
            40%, 100% { transform: translate(var(--beam-R-X), var(--beam-R-Y)); opacity: 1;}  
        }
        
        @keyframes diffuseLight { 
            0%, 50% { filter: blur(2px); } 
            100% { filter: blur(var(--blur-max)); } 
        }
        
        @keyframes lightsFlicker {
            0%, 65% { opacity: 1; } 
            66%, 70% { opacity: 0.1; } 
            71%, 75% { opacity: 1; } 
            76%, 80% { opacity: 0.1; } 
            81%, 85% { opacity: 1; } 
            86%, 90% { opacity: 0.1; } 
            91%, 100% { opacity: 1; }
        }
        
        @keyframes removeDarkness { 
            0%, 92% { opacity: 1; } 
            100% { opacity: 0; visibility: hidden; } 
        }

        /* --- MEDIA QUERIES (MOBILE) --- */
        @media (max-width: 768px) {
            :root {
                --light-size: 260px; 
                --light-offset: -130px;
                --blur-max: 20px;
                --beam-C-Y: 0vh;  
                --beam-L-X: 0vw;   --beam-L-Y: -35vh;
                --beam-R-X: 0vw;   --beam-R-Y: 35vh;  
            }

            .coming-soon-container {
                font-size: 6.5vw; 
                letter-spacing: 1px; 
            }

            .part-of-it {
                font-size: 5vw; 
            }

            .footer {
                display: none; 
            }
            
            .subtle-link {
                bottom: 15px; 
                font-size: 10px;
                letter-spacing: 1px;
            }
            .link-left { left: 5vw; }
            .link-right { right: 5vw; }
        }
    </style>
</head>
<body>

    <div class="cream-bg"></div>

    <div class="paint-drips-container" id="paint-drips-container"></div>
    <div class="spotlight-wrapper">
        <div class="lights-container">
            <div class="light center-beam"></div>
            <div class="light left-beam"></div>
            <div class="light right-beam"></div>
        </div>
    </div>

    <div class="content-wrapper">
        <img src="logowektor.svg" alt="3ULT LOGO">
        
        <div class="dev-phase-note">* website in development</div>
        
        <div id="content-to-center" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <div class="coming-soon-container gothic-text">
                <span>COMING</span>
                <span>SOON...</span>
            </div>
            <div class="part-of-it gothic-text">be part of it.</div>
        </div>
        
        <div id="countdown" class="countdown"></div>
        
        <a href="vessel.html" class="next-vessel-link">next vessel</a>
    </div>

    <a href="about.html" class="subtle-link link-left">about...</a>
    <a href="terms.html" class="subtle-link link-right">terms & privacy</a>

    <div class="footer">3ULT /// 2026 /// MAY</div>

    <script>
        const countDownDate = new Date("May 03, 2026 13:00:00").getTime();
        const dripsContainer = document.getElementById("paint-drips-container");
        let intervalId;

        function createDripGroup() {
            const group = document.createElement("div");
            group.className = "drip-group";
            group.style.left = `${10 + Math.random() * 80}vw`;
            group.style.top = `${10 + Math.random() * 80}vh`;
            group.style.transform = `rotate(${Math.random() * 360}deg)`;

            const uniformSize = 10 + Math.random() * 8; 
            const drops = [
                { dx: 0, dy: 0, delay: 0 }, 
                { dx: -10 - Math.random() * 5, dy: 8 + Math.random() * 5, delay: 0.15 + Math.random() * 0.3 }, 
                { dx: 12 + Math.random() * 5, dy: -5 - Math.random() * 5, delay: 0.3 + Math.random() * 0.4 }   
            ];

            drops.forEach(drop => {
                const drip = document.createElement("div");
                drip.className = "drip";
                drip.style.left = `${drop.dx}px`;
                drip.style.top = `${drop.dy}px`;
                drip.style.width = `${uniformSize}px`;
                drip.style.height = `${uniformSize}px`;
                drip.style.animationDelay = `${drop.delay}s`; 
                group.appendChild(drip);
            });

            dripsContainer.appendChild(group);
            setTimeout(() => { if (group.parentNode) group.parentNode.removeChild(group); }, 6000);
        }

        let continueSpawning = true;
        function spawnLoop() {
            if (!continueSpawning) return; 
            createDripGroup();
            setTimeout(spawnLoop, (3 + Math.random() * 2) * 1000);
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const formatTime = (time) => time < 10 ? "0" + time : time;
            
            document.getElementById("countdown").innerHTML = 
                "<div><span class='countdown-number'>" + formatTime(Math.floor(distance / (1000 * 60 * 60 * 24))) + "</span><span class='countdown-label'>days</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))) + "</span><span class='countdown-label'>hours</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60))) + "</span><span class='countdown-label'>mins</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(Math.floor((distance % (1000 * 60)) / 1000)) + "</span><span class='countdown-label'>secs</span></div>";

            if (distance < 0) {
                clearInterval(intervalId);
               
                document.getElementById("countdown").style.visibility = "hidden";

                if (!document.getElementById('centered-clone')) {
                    const originalContent = document.getElementById('content-to-center');
                    
                    const clone = originalContent.cloneNode(true);
                    clone.id = 'centered-clone';
                    clone.style.position = 'fixed';
                    clone.style.top = '50%';
                    clone.style.left = '50%';
                    clone.style.transform = 'translate(-50%, -50%)';
                    
                    clone.style.zIndex = '50'; 
                    
                    const clonePartOfIt = clone.querySelector('.part-of-it');
                    if (clonePartOfIt) clonePartOfIt.style.marginBottom = '0';

                    const cloneComingSoon = clone.querySelector('.coming-soon-container');
                    if (cloneComingSoon) {
                        cloneComingSoon.innerHTML = "<span>First vessel is available now!</span>";
                        cloneComingSoon.style.textTransform = "none";
                    }

                    document.body.appendChild(clone);
                    originalContent.style.visibility = 'hidden';
                }

                const linkVessel = document.querySelector('.next-vessel-link');
                if(linkVessel) {
                    linkVessel.innerText = "check vessel";
                }
            }
        }

        const nextVesselLink = document.querySelector('.next-vessel-link');
        nextVesselLink.addEventListener('click', function(e) {
            if (window.innerWidth <= 768 || 'ontouchstart' in window) {
                e.preventDefault(); 
                this.classList.add('active-shadow'); 
                
                setTimeout(() => {
                    window.location.href = this.href;
                }, 800);
            }
        });

        // 1. Zdarzenia natychmiastowe (niezależne od sieci)
        window.addEventListener('DOMContentLoaded', () => {
            if (window.location.search.includes('skipAnim=true')) {
                const spotlight = document.querySelector('.spotlight-wrapper');
                if (spotlight) spotlight.style.display = 'none';
                
                const metaTheme = document.getElementById('theme-color-meta');
                if(metaTheme) metaTheme.setAttribute('content', '#faf0e6');
                document.documentElement.style.backgroundColor = '#faf0e6';
                document.body.style.backgroundColor = '#faf0e6';
            }

            updateCountdown(); 
            intervalId = setInterval(updateCountdown, 1000);
        });

        // 2. Zdarzenia czekające na PEŁNE załadowanie wszystkich plików z serwera (czcionki, grafiki itp.)
        window.addEventListener('load', () => {
            // Nadanie tej klasy ożywia CSS, zdejmując 'paused' ze wszystkich animacji
            document.body.classList.add('anim-ready');
            
            // Kropki zaczynają kapać dopiero gdy włącza się cała reszta
            spawnLoop();

            if (!window.location.search.includes('skipAnim=true')) {
                const metaTheme = document.getElementById('theme-color-meta');
                
                // Zmiana koloru odbywa się idealnie w tempo (po 1.84s), żeby zgrać się z mrugnięciem światła
                setTimeout(() => {
                    if(metaTheme) metaTheme.setAttribute('content', '#faf0e6');
                    document.documentElement.style.backgroundColor = '#faf0e6';
                    document.body.style.backgroundColor = '#faf0e6';
                }, 1840); 
            }
        });
    </script>
</body>
</html>
