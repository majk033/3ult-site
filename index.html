<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ULT // COMING SOON...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #ffffff; /* Białe tło */
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            gap: 35px; /* Magiczna wartość: równe odstępy w pionie między elementami */
        }

        /* Wspólna klasa dla gotyckiego stylu */
        .gothic-text {
            font-family: 'UnifrakturMaguntia', cursive;
        }

        img {
            max-width: 350px;
            width: 80%;
            height: auto;
            opacity: 0; /* Zaczyna jako niewidoczne */
            animation: fadeIn 1.5s ease-out forwards; /* Animacja loga */
        }

        .coming-soon {
            color: #990000; 
            font-size: 28px; /* Powiększone, bo gotyckie litery są drobniejsze */
            letter-spacing: 4px;
            text-transform: lowercase;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 0.5s forwards; /* Startuje 0.5s po logo */
        }

        .part-of-it {
            color: #000000;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: lowercase;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 1s forwards; /* Startuje 1s po logo */
        }

        /* Styl samego licznika */
        .countdown {
            display: flex;
            gap: 20px;
            font-size: 32px;
            color: #000000;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 1.5s forwards; /* Startuje na końcu */
        }

        /* Blok dla pojedynczej liczby w liczniku */
        .countdown div {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Etykiety pod liczbami (dni, godz, min, sek) */
        .countdown span {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            margin-top: 5px;
        }

        /* Stopka, teraz ładnie przyklejona do dołu */
        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: #999;
            letter-spacing: 3px;
            opacity: 0;
            animation: fadeIn 1.5s ease-out 2s forwards;
        }

        /* Definicja animacji: łagodne pojawienie się z lekkim ruchem w górę */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <img src="3ULT.png" alt="3ULT LOGO">
    
    <div class="coming-soon gothic-text">coming soon...</div>
    <div class="part-of-it gothic-text">be the part of it.</div>
    
    <div id="countdown" class="countdown gothic-text"></div>

    <div class="footer">3ULT  2026 </div>

    <script>
        // Ustaw datę końcową: 23 kwietnia 2026, godzina 00:00:00
        const countDownDate = new Date("Apr 23, 2026 00:00:00").getTime();

        // Aktualizuj licznik co 1 sekundę
        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            // Obliczenia dla dni, godzin, minut i sekund
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Wyświetlenie wyniku w kontenerze
            document.getElementById("countdown").innerHTML = 
                "<div>" + days + "<span>dni</span></div>" + 
                "<div>" + hours + "<span>godz</span></div>" + 
                "<div>" + minutes + "<span>min</span></div>" + 
                "<div>" + seconds + "<span>sek</span></div>";

            // Co zrobić, gdy czas minie
            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "DROP JEST DOSTĘPNY";
            }
        }, 1000);
    </script>

</body>
</html>
