<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ULT // COMING SOON...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ZMIENNE RESPONSYWNE --- */
        :root {
            --light-size: 400px;
            --light-offset: -200px;
            --blur-max: 30px;
            
            /* DESKTOP: Idealnie poziome rozszczepienie. 
               Oś Y jest zablokowana na 10vh (tam gdzie staje środek). */
            --beam-L-X: -30vw; --beam-L-Y: 10vh;
            --beam-R-X: 30vw;  --beam-R-Y: 10vh;
            
            --main-gap: 30px; 
            --logo-margin: 20px;
        }

        @media (max-width: 768px) {
            :root {
                --light-size: 220px;
                --light-offset: -110px;
                --blur-max: 20px;
                
                /* MOBILE: Idealnie pionowe rozszczepienie z regularnymi odstępami.
                   Środek to 10vh. Odstęp to dokładnie 25vh w górę i w dół. */
                --beam-L-X: 0vw;   --beam-L-Y: -15vh; 
                --beam-R-X: 0vw;   --beam-R-Y: 35vh;  
                
                --main-gap: 25px;
                --logo-margin: 15px;
            }
        }

        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            gap: var(--main-gap);
            overflow: hidden; 
        }

        .gothic-text {
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
        }
        
        img {
            max-width: 300px; 
            width: 70%;
            height: auto;
            margin-bottom: var(--logo-margin); 
            min-height: 80px; 
        }

        .coming-soon-container {
            color: #990000; 
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase; 
            display: flex;
            gap: 15px; 
        }

        .part-of-it {
            color: #000000;
            font-size: 26px;
            letter-spacing: 2px;
            text-transform: lowercase;
            text-align: center;
        }

        .countdown {
            display: flex;
            gap: 20px;
            color: #000000;
            min-height: 60px; 
        }

        .countdown div {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 65px; 
        }

        .countdown-number {
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
            font-size: 36px;
            font-variant-numeric: tabular-nums; 
        }

        .countdown-label {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            margin-top: 5px;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 11px;
            color: #aaa; 
            letter-spacing: 3px;
            z-index: 10; 
        }

        /* --- MASKA ŚWIATŁA --- */
        
        .spotlight-wrapper {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none; 
            mix-blend-mode: multiply; 
            animation: removeDarkness 12s forwards; /* Czas zwolniony do 12s */
        }

        .lights-container {
            width: 100%;
            height: 100%;
            background-color: #000000; 
            animation: lightsFlicker 12s forwards; 
        }

        .light {
            position: absolute;
            top: 50%;
            left: 50%;
            width: var(--light-size); 
            height: var(--light-size);
            margin-top: var(--light-offset);
            margin-left: var(--light-offset);
            
            border-radius: 40% 60% 70% 30% / 50% 60% 30% 70%; 
            background: radial-gradient(circle at center, rgba(255,255,255,1) 0%, rgba(255,255,255,1) 45%, rgba(0,0,0,1) 65%);
            mix-blend-mode: screen; 
            
            animation: shapeWobble 1s infinite linear alternate-reverse;
        }
        
        @keyframes shapeWobble {
            to { border-radius: 60% 40% 30% 70% / 60% 50% 70% 30%; }
        }

        /* Czasy dopasowane do 12 sekundowego cyklu */
        .center-beam { animation: beamCenter 11.5s ease-in-out forwards, diffuseLight 12s ease-in-out forwards; }
        .left-beam { animation: beamLeft 11.5s ease-in-out forwards, diffuseLight 12s ease-in-out forwards; }
        .right-beam { animation: beamRight 11.5s ease-in-out forwards, diffuseLight 12s ease-in-out forwards; }

        @keyframes beamCenter {
            0%   { transform: translate(0, -38vh); opacity: 0; } 
            2%   { transform: translate(0, -38vh); opacity: 1; }
            15%  { transform: translate(0, -38vh); }             
            
            25%  { transform: translate(0, -15vh); }             
            35%  { transform: translate(0, -15vh); }             
            
            45%  { transform: translate(0, -5vh); }              
            55%  { transform: translate(0, -5vh); }              
            
            65%  { transform: translate(0, 45vh); }              
            75%  { transform: translate(0, 45vh); }              
            
            82%, 100% { transform: translate(0, 10vh); opacity: 1;} 
        }

        /* Boczne światła ukryte pod głównym punktem 10vh, płynnie wyjeżdżają */
        @keyframes beamLeft {
            0%, 81% { transform: translate(0, 10vh); opacity: 0; } 
            82%  { transform: translate(0, 10vh); opacity: 1; } 
            84%  { transform: translate(0, 10vh); }                
            90%, 100% { transform: translate(var(--beam-L-X), var(--beam-L-Y)); opacity: 1;} 
        }

        @keyframes beamRight {
            0%, 81% { transform: translate(0, 10vh); opacity: 0; } 
            82%  { transform: translate(0, 10vh); opacity: 1; } 
            84%  { transform: translate(0, 10vh); }                
            90%, 100% { transform: translate(var(--beam-R-X), var(--beam-R-Y)); opacity: 1;}  
        }

        @keyframes diffuseLight {
            0%, 86% { filter: blur(2px); }   
            90%, 100% { filter: blur(var(--blur-max)); }  
        }

        @keyframes lightsFlicker {
            0%, 93% { opacity: 1; }
            94%  { opacity: 0.1; } 
            95%  { opacity: 1; }
            96%  { opacity: 0.1; } 
            97%  { opacity: 1; }
            98%  { opacity: 0.1; } 
            99%, 100% { opacity: 1; }
        }

        @keyframes removeDarkness {
            0%, 99% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

    </style>
</head>
<body>

    <div class="spotlight-wrapper">
        <div class="lights-container">
            <div class="light center-beam"></div>
            <div class="light left-beam"></div>
            <div class="light right-beam"></div>
        </div>
    </div>

    <img src="logowektor.svg" alt="3ULT LOGO">
    
    <div class="coming-soon-container gothic-text">
        <span>COMING</span>
        <span>SOON...</span>
    </div>

    <div class="part-of-it gothic-text">be the part of it.</div>
    
    <div id="countdown" class="countdown"></div>

    <div class="footer">3ULT /// 2026 /// APRIL</div>

    <script>
        const countDownDate = new Date("Apr 23, 2026 00:00:00").getTime();
        let intervalId;

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const formatTime = (time) => time < 10 ? "0" + time : time;

            document.getElementById("countdown").innerHTML = 
                "<div><span class='countdown-number'>" + formatTime(days) + "</span><span class='countdown-label'>dni</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(hours) + "</span><span class='countdown-label'>godz</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(minutes) + "</span><span class='countdown-label'>min</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(seconds) + "</span><span class='countdown-label'>sek</span></div>";

            if (distance < 0) {
                clearInterval(intervalId);
                document.getElementById("countdown").innerHTML = "<span class='gothic-text' style='font-size: 32px;'>DROP JEST DOSTĘPNY</span>";
            }
        }

        updateCountdown();
        intervalId = setInterval(updateCountdown, 1000);
    </script>

</body>
</html>
