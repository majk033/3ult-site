<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ULT // COMING SOON...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ZMIENNE RESPONSYWNE (MAGIA CSS) --- */
        :root {
            /* Desktop (Domyślnie) */
            --light-size: 400px; 
            --light-offset: -200px;
            --blur-max: 30px;
            /* Rozszczepienie Poziome (Desktop) */
            --beam-L-X: -30vw; --beam-L-Y: 0vh;
            --beam-R-X: 30vw;  --beam-R-Y: 0vh;
            --main-gap: 30px; 
        }

        /* Telefon (Zmieniamy układ) */
        @media (max-width: 768px) {
            :root {
                --light-size: 200px; 
                --light-offset: -100px;
                --blur-max: 20px;
                /* ROZSZCZEPIENIE PIONOWE (Telefon) */
                --beam-L-X: 0vw;   --beam-L-Y: -35vh; 
                --beam-R-X: 0vw;   --beam-R-Y: 35vh;  
                --main-gap: 25px;
            }
        }

        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            gap: var(--main-gap);
            overflow: hidden; 
        }

        .gothic-text {
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
        }

        img {
            max-width: 300px; 
            width: 70%;
            height: auto;
            margin-bottom: 20px; 
        }

        .coming-soon-container {
            color: #990000; 
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase; 
            display: flex;
            gap: 15px; 
        }

        .part-of-it {
            color: #000000;
            font-size: 26px;
            letter-spacing: 2px;
            text-transform: lowercase;
        }

        .countdown {
            display: flex;
            gap: 20px;
            color: #000000;
        }

        .countdown div {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 65px; 
        }

        .countdown-number {
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
            font-size: 36px;
            font-variant-numeric: tabular-nums; 
        }

        .countdown-label {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            margin-top: 5px;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 11px;
            color: #aaa; 
            letter-spacing: 3px;
            z-index: 10; 
        }

        /* --- MASKA ŚWIATŁA --- */
        
        .spotlight-wrapper {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none; 
            mix-blend-mode: multiply; 
            animation: removeDarkness 20s forwards; 
        }

        .lights-container {
            width: 100%;
            height: 100%;
            background-color: #000000; 
            animation: lightsFlicker 20s forwards;
        }

        .light {
            position: absolute;
            top: 50%;
            left: 50%;
            width: var(--light-size); 
            height: var(--light-size);
            margin-top: var(--light-offset);
            margin-left: var(--light-offset);
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(255,255,255,1) 0%, rgba(255,255,255,1) 48%, rgba(255,255,255,0) 50%);
        }

        .center-beam { animation: beamCenter 19s ease-in-out forwards, diffuseLight 20s ease-in-out forwards; }
        .left-beam { animation: beamLeft 19s ease-in-out forwards, diffuseLight 20s ease-in-out forwards; }
        .right-beam { animation: beamRight 19s ease-in-out forwards, diffuseLight 20s ease-in-out forwards; }

        @keyframes beamCenter {
            0%   { transform: translate(0, -40vh); opacity: 0; } 
            5%   { transform: translate(0, -40vh); opacity: 1; } 
            18%  { transform: translate(0, -40vh); }             
            25%  { transform: translate(0, -22vh); }             
            35%  { transform: translate(0, -22vh); }              
            42%  { transform: translate(0, -8vh); }              
            50%  { transform: translate(0, -8vh); }              
            60%  { transform: translate(0, 40vh); }              
            70%  { transform: translate(0, 40vh); }              
            80%, 100% { transform: translate(0, 0vh); opacity: 1;} 
        }

        @keyframes beamLeft {
            0%, 79% { transform: translate(0, 0vh); opacity: 0; } 
            80%  { transform: translate(0, 0vh); opacity: 1; } 
            83%  { transform: translate(0, 0vh); }               
            88%, 100% { transform: translate(var(--beam-L-X), var(--beam-L-Y)); opacity: 1;} 
        }

        @keyframes beamRight {
            0%, 79% { transform: translate(0, 0vh); opacity: 0; } 
            80%  { transform: translate(0, 0vh); opacity: 1; } 
            83%  { transform: translate(0, 0vh); }               
            88%, 100% { transform: translate(var(--beam-R-X), var(--beam-R-Y)); opacity: 1;}  
        }

        @keyframes diffuseLight {
            0%, 82% { filter: blur(2px); }   
            88%, 100% { filter: blur(var(--blur-max)); }  
        }

        @keyframes lightsFlicker {
            0%, 90% { opacity: 1; }
            91%  { opacity: 0.1; } 
            92%  { opacity: 1; }
            93%  { opacity: 0.1; } 
            94%  { opacity: 1; }
            95%  { opacity: 0.1; } 
            96%, 100% { opacity: 1; }
        }

        @keyframes removeDarkness {
            0%, 96% { opacity: 1; }
            99%, 100% { opacity: 0; visibility: hidden; }
        }

    </style>
</head>
<body>

    <div class="spotlight-wrapper">
        <div class="lights-container">
            <div class="light center-beam"></div>
            <div class="light left-beam"></div>
            <div class="light right-beam"></div>
        </div>
    </div>

    <img src="logowektor.svg" alt="3ULT LOGO">
    
    <div class="coming-soon-container gothic-text">
        <span>COMING</span>
        <span>SOON...</span>
    </div>

    <div class="part-of-it gothic-text">be the part of it.</div>
    
    <div id="countdown" class="countdown"></div>

    <div class="footer">3ULT /// 2026 /// APRIL</div>

    <script>
        const countDownDate = new Date("Apr 23, 2026 00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const formatTime = (time) => time < 10 ? "0" + time : time;

            document.getElementById("countdown").innerHTML = 
                "<div><span class='countdown-number'>" + formatTime(days) + "</span><span class='countdown-label'>dni</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(hours) + "</span><span class='countdown-label'>godz</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(minutes) + "</span><span class='countdown-label'>min</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(seconds) + "</span><span class='countdown-label'>sek</span></div>";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "<span class='gothic-text' style='font-size: 32px;'>DROP JEST DOSTĘPNY</span>";
            }
        }, 1000);
    </script>

</body>
</html>
