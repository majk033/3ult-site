<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ULT // COMING SOON...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            gap: 35px;
            overflow: hidden; 
        }

        .gothic-text {
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
        }

        img {
            max-width: 350px;
            width: 80%;
            height: auto;
        }

        .coming-soon-container {
            color: #990000; 
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase; 
            display: flex;
            gap: 15px; 
        }

        .part-of-it {
            color: #000000;
            font-size: 26px;
            letter-spacing: 2px;
            text-transform: lowercase;
        }

        .countdown {
            display: flex;
            gap: 20px;
            color: #000000;
        }

        .countdown div {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 65px; 
        }

        .countdown-number {
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
            font-size: 36px;
            font-variant-numeric: tabular-nums; 
        }

        .countdown-label {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            margin-top: 5px;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: #999;
            letter-spacing: 3px;
        }

        .spotlight-wrapper {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none; 
            mix-blend-mode: multiply; 
            animation: removeDarkness 15s forwards;
        }

        .lights-container {
            width: 100%;
            height: 100%;
            background-color: #000000; 
            animation: lightsFlicker 15s forwards;
        }

        .light {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 450px; 
            height: 450px;
            margin-top: -225px;
            margin-left: -225px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(255,255,255,1) 0%, rgba(255,255,255,1) 48%, rgba(255,255,255,0) 50%);
        }

        .center-beam { animation: beamCenter 15s ease-in-out forwards, diffuseLight 15s ease-in-out forwards; }
        .left-beam { animation: beamLeft 15s ease-in-out forwards, diffuseLight 15s ease-in-out forwards; }
        .right-beam { animation: beamRight 15s ease-in-out forwards, diffuseLight 15s ease-in-out forwards; }

        @keyframes beamCenter {
            0%   { transform: translate(0, -35vh); opacity: 0; } 
            6%   { transform: translate(0, -35vh); opacity: 1; } 
            20%  { transform: translate(0, -35vh); }             
            30%  { transform: translate(0, -5vh); }              
            40%  { transform: translate(0, -5vh); }              
            50%  { transform: translate(0, 30vh); }              
            60%  { transform: translate(0, 30vh); }              
            66%, 100% { transform: translate(0, 0vh); opacity: 1;} 
        }

        @keyframes beamLeft {
            0%, 65% { transform: translate(0, 0vh); opacity: 0; } 
            66%  { transform: translate(0, 0vh); opacity: 1; } 
            70%  { transform: translate(0, 0vh); }               
            75%, 100% { transform: translate(-30vw, 0vh); opacity: 1;} 
        }

        @keyframes beamRight {
            0%, 65% { transform: translate(0, 0vh); opacity: 0; } 
            66%  { transform: translate(0, 0vh); opacity: 1; } 
            70%  { transform: translate(0, 0vh); }               
            75%, 100% { transform: translate(30vw, 0vh); opacity: 1;}  
        }

        @keyframes diffuseLight {
            0%, 68% { filter: blur(2px); }   
            75%, 100% { filter: blur(35px); }  
        }

        @keyframes lightsFlicker {
            0%, 82% { opacity: 1; }
            83%  { opacity: 0.1; } 
            84%  { opacity: 1; }
            85%  { opacity: 0.1; } 
            86%  { opacity: 1; }
            87%  { opacity: 0.1; } 
            88%, 100% { opacity: 1; }
        }

        @keyframes removeDarkness {
            0%, 90% { opacity: 1; }
            96%, 100% { opacity: 0; visibility: hidden; }
        }

    </style>
</head>
<body>

    <div class="spotlight-wrapper">
        <div class="lights-container">
            <div class="light center-beam"></div>
            <div class="light left-beam"></div>
            <div class="light right-beam"></div>
        </div>
    </div>

    <img src="logowektor.svg" alt="3ULT LOGO">
    
    <div class="coming-soon-container gothic-text">
        <span>COMING</span>
        <span>SOON...</span>
    </div>

    <div class="part-of-it gothic-text">be the part of it.</div>
    
    <div id="countdown" class="countdown"></div>

    <div class="footer">3ULT /// 2026 /// APRIL</div>

    <script>
        const countDownDate = new Date("Apr 23, 2026 00:00:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const formatTime = (time) => time < 10 ? "0" + time : time;

            document.getElementById("countdown").innerHTML = 
                "<div><span class='countdown-number'>" + formatTime(days) + "</span><span class='countdown-label'>dni</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(hours) + "</span><span class='countdown-label'>godz</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(minutes) + "</span><span class='countdown-label'>min</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(seconds) + "</span><span class='countdown-label'>sek</span></div>";

            if (distance < 0) {
                clearInterval(x);
                document.getElementById("countdown").innerHTML = "<span class='gothic-text' style='font-size: 32px;'>DROP JEST DOSTĘPNY</span>";
            }
        }, 1000);
    </script>

</body>
</html>
