<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ULT // COMING SOON...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- ZMIENNE RESPONSYWNE --- */
        :root {
            --light-size: 400px;
            --light-offset: -200px;
            --blur-max: 30px;
            
            --step1-y: -24vh; 
            --step2-y: -7vh;  
            --step3-y: 9vh;   

            --beam-C-Y: -7vh;  
            --beam-L-X: -32vw; --beam-L-Y: -7vh;
            --beam-R-X: 32vw;  --beam-R-Y: -7vh;
        }

        @media (max-width: 768px) {
            :root {
                --light-size: 260px; 
                --light-offset: -130px;
                --blur-max: 20px;
                
                --step1-y: -24vh;
                --step2-y: -7vh; 
                --step3-y: 9vh;  

                --beam-C-Y: -7vh;  
                --beam-L-X: 0vw;   --beam-L-Y: -37vh;
                --beam-R-X: 0vw;   --beam-R-Y: 23vh;  
            }
        }

        body {
            background-color: #faf0e6;
            color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; 
        }

        /* --- SEKCJA KROPLE FARBY NA TAFLI EKRANU --- */
        .paint-drips-container {
            position: fixed;
            inset: 0;
            z-index: 1; 
            pointer-events: none; 
        }

        .drip-group {
            position: absolute;
            width: 0;
            height: 0;
        }

        .drip {
            position: absolute;
            background-color: #990000;
            border-radius: 40% 60% 70% 30% / 50% 60% 30% 70%;
            opacity: 0;
            transform-origin: center;
            animation: liquidSplat 5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes liquidSplat {
            0%   { transform: scale(1.5) translateY(-15px); opacity: 0; }
            5%   { transform: scale(1.1) translateY(0); opacity: 1; } 
            10%  { transform: scale(1) translateY(0); opacity: 1; }   
            70%  { transform: scale(1) translateY(0); opacity: 1; }   
            100% { transform: scale(0.9) translateY(0); opacity: 0; } 
        }

        /* --- KONTENER GŁÓWNY TREŚCI --- */
        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            transform: translateY(-8vh);
            z-index: 50; 
        }

        .gothic-text {
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
        }
        
        img {
            max-width: 300px; 
            width: 70%;
            height: auto;
            margin-bottom: 7vh;
            min-height: 80px; 
        }

        .coming-soon-container {
            color: #990000; 
            font-size: 32px;
            letter-spacing: 4px;
            text-transform: uppercase; 
            display: flex;
            gap: 15px; 
            margin-bottom: 1vh;
        }

        .part-of-it {
            color: #000000;
            font-size: 26px;
            letter-spacing: 2px;
            text-transform: lowercase;
            text-align: center;
            margin-bottom: 8vh; /* Przywrócony duży margines, by licznik został na swoim miejscu dla światła */
        }

        .countdown {
            display: flex;
            gap: 20px;
            color: #000000;
            min-height: 60px; 
        }

        .countdown div {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 65px; 
        }

        .countdown-number {
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
            font-size: 36px;
            font-variant-numeric: tabular-nums; 
        }

        .countdown-label {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #666;
            margin-top: 5px;
        }

        /* --- NOWE STYLE PRZYCISKU: "NEXT VESSEL" --- */
        .next-vessel-link {
            display: inline-block;
            background-color: transparent; 
            
            /* Ekstremalnie bliski tłu (#faf0e6) kolor napisu, prawie "ghost" */
            color: #f0e5da; 
            
            font-family: 'UnifrakturCook', cursive;
            font-weight: 700;
            font-size: 24px;
            
            letter-spacing: 3px;
            text-transform: lowercase;
            text-decoration: none;
            
            margin-top: 4vh; /* Odstęp od góry (od licznika) */
            
            transition: text-shadow 1s ease-in-out, color 1s ease-in-out; 
            position: relative;
            z-index: 105; 
        }

        .next-vessel-link:hover {
            text-shadow: 0 0 10px rgba(153, 0, 0, 0.9), 0 0 25px rgba(153, 0, 0, 0.7); 
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 11px;
            color: #aaa; 
            letter-spacing: 3px;
            z-index: 10; 
        }

        /* --- MASKA ŚWIATŁA --- */
        .spotlight-wrapper {
            position: fixed;
            inset: 0;
            z-index: 100;
            pointer-events: none; 
            mix-blend-mode: multiply; 
            animation: removeDarkness 12s forwards; 
        }

        .lights-container {
            width: 100%;
            height: 100%;
            background-color: #000000; 
            animation: lightsFlicker 12s forwards; 
        }

        .light {
            position: absolute;
            top: 50%;
            left: 50%;
            width: var(--light-size); 
            height: var(--light-size);
            margin-top: var(--light-offset);
            margin-left: var(--light-offset);
            
            border-radius: 40% 60% 70% 30% / 50% 60% 30% 70%; 
            background: radial-gradient(circle at center, rgba(255,255,255,1) 0%, rgba(255,255,255,1) 45%, rgba(0,0,0,1) 65%);
            mix-blend-mode: screen; 
            
            animation: shapeWobble 1s infinite linear alternate-reverse;
        }
        
        @keyframes shapeWobble {
            to { border-radius: 60% 40% 30% 70% / 60% 50% 70% 30%; }
        }

        .center-beam { animation: beamCenter 11.5s ease-in-out forwards, diffuseLight 12s ease-in-out forwards; }
        .left-beam { animation: beamLeft 11.5s ease-in-out forwards, diffuseLight 12s ease-in-out forwards; }
        .right-beam { animation: beamRight 11.5s ease-in-out forwards, diffuseLight 12s ease-in-out forwards; }

        @keyframes beamCenter {
            0%   { transform: translate(0, var(--step1-y)); opacity: 0; } 
            2%   { transform: translate(0, var(--step1-y)); opacity: 1; }
            15%  { transform: translate(0, var(--step1-y)); }             
            
            25%  { transform: translate(0, var(--step2-y)); }             
            35%  { transform: translate(0, var(--step2-y)); }             
            
            45%  { transform: translate(0, var(--step3-y)); }              
            60%  { transform: translate(0, var(--step3-y)); }              
            
            75%  { transform: translate(0, var(--step2-y)); }
            81%  { transform: translate(0, var(--step2-y)); }
            
            84%  { transform: translate(0, var(--step2-y)); opacity: 1;}
            90%, 100% { transform: translate(0, var(--beam-C-Y)); opacity: 1;} 
        }

        @keyframes beamLeft {
            0%, 81% { transform: translate(0, var(--step2-y)); opacity: 0; } 
            82%  { transform: translate(0, var(--step2-y)); opacity: 1; } 
            84%  { transform: translate(0, var(--step2-y)); }                
            90%, 100% { transform: translate(var(--beam-L-X), var(--beam-L-Y)); opacity: 1;} 
        }

        @keyframes beamRight {
            0%, 81% { transform: translate(0, var(--step2-y)); opacity: 0; } 
            82%  { transform: translate(0, var(--step2-y)); opacity: 1; } 
            84%  { transform: translate(0, var(--step2-y)); }                
            90%, 100% { transform: translate(var(--beam-R-X), var(--beam-R-Y)); opacity: 1;}  
        }

        @keyframes diffuseLight {
            0%, 86% { filter: blur(2px); }   
            90%, 100% { filter: blur(var(--blur-max)); }  
        }

        @keyframes lightsFlicker {
            0%, 93% { opacity: 1; }
            94%  { opacity: 0.1; } 
            95%  { opacity: 1; }
            96%  { opacity: 0.1; } 
            97%  { opacity: 1; }
            98%  { opacity: 0.1; } 
            99%, 100% { opacity: 1; }
        }

        @keyframes removeDarkness {
            0%, 99% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

    </style>
</head>
<body>

    <div class="paint-drips-container" id="paint-drips-container"></div>

    <div class="spotlight-wrapper">
        <div class="lights-container">
            <div class="light center-beam"></div>
            <div class="light left-beam"></div>
            <div class="light right-beam"></div>
        </div>
    </div>

    <div class="content-wrapper">
        <img src="logowektor.svg" alt="3ULT LOGO">
        
        <div class="coming-soon-container gothic-text">
            <span>COMING</span>
            <span>SOON...</span>
        </div>

        <div class="part-of-it gothic-text">be the part of it.</div>
        
        <div id="countdown" class="countdown"></div>
        
        <a href="vessel.html" class="next-vessel-link">next vessel</a>
    </div>

    <div class="footer">3ULT /// 2026 /// APRIL</div>

    <script>
        const countDownDate = new Date("Apr 23, 2026 00:00:00").getTime();
        const dripsContainer = document.getElementById("paint-drips-container");
        let intervalId;

        // --- SILNIK FARBY UDERZAJĄCEJ W TAFLĘ ---

        function createDripGroup() {
            const group = document.createElement("div");
            group.className = "drip-group";

            const x = 10 + Math.random() * 80; 
            const y = 10 + Math.random() * 80; 
            group.style.left = `${x}vw`;
            group.style.top = `${y}vh`;

            group.style.transform = `rotate(${Math.random() * 360}deg)`;

            const uniformSize = 10 + Math.random() * 8; 

            const drops = [
                { dx: 0, dy: 0, delay: 0 }, 
                { dx: -10 - Math.random() * 5, dy: 8 + Math.random() * 5, delay: 0.15 + Math.random() * 0.3 }, 
                { dx: 12 + Math.random() * 5, dy: -5 - Math.random() * 5, delay: 0.3 + Math.random() * 0.4 }   
            ];

            drops.forEach(drop => {
                const drip = document.createElement("div");
                drip.className = "drip";
                drip.style.left = `${drop.dx}px`;
                drip.style.top = `${drop.dy}px`;
                drip.style.width = `${uniformSize}px`;
                drip.style.height = `${uniformSize}px`;
                drip.style.animationDelay = `${drop.delay}s`; 
                
                group.appendChild(drip);
            });

            dripsContainer.appendChild(group);

            setTimeout(() => {
                if (group.parentNode) {
                    group.parentNode.removeChild(group);
                }
            }, 6000);
        }

        let continueSpawning = true;

        function spawnLoop() {
            if (!continueSpawning) return; 

            createDripGroup();
            
            const nextSpawnDelay = (3 + Math.random() * 2) * 1000;
            setTimeout(spawnLoop, nextSpawnDelay);
        }

        // --- LICZNIK ---

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = countDownDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            const formatTime = (time) => time < 10 ? "0" + time : time;

            document.getElementById("countdown").innerHTML = 
                "<div><span class='countdown-number'>" + formatTime(days) + "</span><span class='countdown-label'>dni</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(hours) + "</span><span class='countdown-label'>godz</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(minutes) + "</span><span class='countdown-label'>min</span></div>" + 
                "<div><span class='countdown-number'>" + formatTime(seconds) + "</span><span class='countdown-label'>sek</span></div>";

            if (distance < 0) {
                clearInterval(intervalId);
                continueSpawning = false; 
                if (dripsContainer.parentNode) {
                    dripsContainer.parentNode.removeChild(dripsContainer);
                }
                document.getElementById("countdown").innerHTML = "<span class='gothic-text' style='font-size: 32px;'>DROP JEST DOSTĘPNY</span>";
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            spawnLoop();
            updateCountdown();
            intervalId = setInterval(updateCountdown, 1000);
        });
    </script>

</body>
</html>
